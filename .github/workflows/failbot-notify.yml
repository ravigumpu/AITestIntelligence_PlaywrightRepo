# Required GitHub Actions secrets (Settings → Secrets → Actions):
#   FAILBOT_URL            — e.g. https://your-server.com or https://your-cloud-run-url
#   FAILBOT_WEBHOOK_SECRET — must match GITHUB_WEBHOOK_SECRET in your Failbot .env

name: Notify Failbot

on:
  workflow_run:
    workflows: ["*"]
    types: [completed]

jobs:
  notify:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion != '' }}
    steps:
      - name: Send to Failbot
        uses: actions/github-script@v7
        with:
          script: |
            const crypto = require('crypto')

            const payload = JSON.stringify({
              action: 'completed',
              workflow_run: {
                id: context.payload.workflow_run.id,
                name: context.payload.workflow_run.name,
                conclusion: context.payload.workflow_run.conclusion,
                head_branch: context.payload.workflow_run.head_branch,
                head_sha: context.payload.workflow_run.head_sha,
                html_url: context.payload.workflow_run.html_url,
                triggering_actor: {
                  login: context.payload.workflow_run.triggering_actor?.login ?? 'unknown'
                }
              },
              repository: {
                full_name: context.repo.owner + '/' + context.repo.repo
              }
            })

            const secret = process.env.FAILBOT_WEBHOOK_SECRET
            const signature = 'sha256=' + crypto
              .createHmac('sha256', secret)
              .update(payload)
              .digest('hex')

            const response = await fetch(process.env.FAILBOT_URL + '/api/webhook/github', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'x-hub-signature-256': signature,
                'x-github-event': 'workflow_run'
              },
              body: payload
            })

            if (!response.ok) {
              const body = await response.text()
              core.setFailed(`Failbot webhook failed: ${response.status} ${body}`)
            } else {
              console.log(`Failbot notified successfully: ${response.status}`)
            }
        env:
          FAILBOT_URL: ${{ secrets.FAILBOT_URL }}
          FAILBOT_WEBHOOK_SECRET: ${{ secrets.FAILBOT_WEBHOOK_SECRET }}
